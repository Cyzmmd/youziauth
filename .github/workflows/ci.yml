name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-build.txt
      - name: Install pinned build dependencies
        run: python -m pip install --requirement requirements-build.txt
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Compile Python sources
        run: python -m compileall -q .
      - name: Build MSI
        shell: powershell
        run: .\build_msi.ps1 -InstallDependencies
      - name: Upload unsigned audit artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: unsigned-msi-${{ github.sha }}
          path: dist/youziauth.msi
          if-no-files-found: error
          retention-days: 7
