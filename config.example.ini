[auth]
portal_url = http://222.198.127.170/

# Optional but recommended when you have the full login page URL.
# The script extracts queryString from it instead of probing the portal home page.
login_url =

# Fill these two values before running.
username = YOUR_STUDENT_ID

# Option 1: put the password here.
password =

# Option 2, safer: leave password empty and set this environment variable.
password_env = CAMPUS_AUTH_PASSWORD

# For this portal, the default service is often the URL-encoded value below.
# If login fails with a service error, try setting this line to an empty value.
service = %E9%BB%98%E8%AE%A4

check_interval_seconds = 60
request_timeout_seconds = 8

# auto: request pageInfo and follow the portal's passwordEncrypt flag.
# true: force RSA encryption. false: force plaintext password submission.
password_encrypt = auto
log_file = campus_auth.log
